<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile - Online Health Monitoring</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    body {
      background: #121212;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      padding: 30px 0;
    }

    .profile-container {
      background-color: #1e1e1e;
      border-radius: 15px;
      padding: 30px;
      max-width: 650px;
      margin: auto;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
    }

    .profile-header {
      text-align: center;
      margin-bottom: 25px;
    }

    .profile-header img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #03dac6;
      object-fit: cover;
      margin-bottom: 10px;
    }

    .profile-header h3 {
      color: #ffffff;
    }

    label {
      font-weight: 500;
      margin-top: 10px;
    }

    label i {
      margin-right: 8px;
      color: #03dac6;
    }

    .form-control {
      background-color: #2c2c2c;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 8px;
    }

    .form-control:focus {
      border-color: #03dac6;
      box-shadow: 0 0 5px rgba(3, 218, 198, 0.6);
    }

    .form-control-file {
      color: #e0e0e0;
    }

    .btn-custom {
      border-radius: 30px;
      padding: 10px 25px;
      font-weight: 500;
      border: none;
      transition: background 0.3s;
    }

    .btn-save {
      background-color: #03dac6;
      color: #121212;
    }

    .btn-save:hover {
      background-color: #01bfa4;
    }

    .btn-reset {
      background-color: #333;
      color: #e0e0e0;
    }

    .btn-reset:hover {
      background-color: #444;
    }

    textarea.form-control {
      resize: vertical;
    }
  </style>
</head>
<body>

<div class="profile-container">
  <div class="profile-header">
    <img src="https://cdn-icons-png.flaticon.com/512/4359/4359963.png" alt="Profile Icon">
    <h3><i class="fas fa-user-circle"></i> Profile Information</h3>
  </div>

  <form action="/profile" method="POST" enctype="multipart/form-data">

    <div class="form-group">
      <label><i class="fas fa-user"></i> Full Name</label>
      <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
    </div>

    <div class="form-group">
      <label><i class="fas fa-calendar-alt"></i> Age</label>
      <input type="number" name="age" class="form-control" placeholder="Enter your age" min="1" required>
    </div>

    <div class="form-group">
      <label><i class="fas fa-venus-mars"></i> Gender</label>
      <select name="gender" class="form-control" required>
        <option value="" disabled selected>Select gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Others</option>
      </select>
    </div>

    <div class="form-group">
      <label><i class="fas fa-envelope"></i> Email</label>
      <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
      <label><i class="fas fa-phone"></i> Phone Number</label>
      <input type="tel" name="phone" class="form-control" placeholder="Enter your phone number">
    </div>

    <div class="form-group">
      <label><i class="fas fa-map-marker-alt"></i> Address</label>
      <textarea name="address" class="form-control" rows="2" placeholder="Enter your address"></textarea>
    </div>

    <div class="form-group">
      <label><i class="fas fa-image"></i> Profile Photo</label>
      <input type="file" name="photo" class="form-control-file">
    </div>

    <div class="text-center mt-4">
      <button type="submit" class="btn btn-custom btn-save"><i class="fas fa-save"></i> Save</button>
      <button type="reset" class="btn btn-custom btn-reset ml-2"><i class="fas fa-undo"></i> Reset</button>
    </div>

  </form>
</div>

</body>
</html>
