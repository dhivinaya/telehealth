<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Booking</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Book an Appointment</h1>
        
        <form action="{{ url_for('book_appointment') }}" method="POST">
            <!-- Hidden field to store the username -->
            <input type="hidden" name="username" value="{{ session.get('username') }}">

            <label for="doctor_name">Select Doctor:</label>
            <select name="doctor_name" required>
                <option value="" disabled selected>Select a doctor</option>
                {% for doctor in doctors %}
                    <option value="{{ doctor }}">{{ doctor }}</option>
                {% endfor %}
            </select>

            <label for="appointment_date">Select Appointment Date:</label>
            <input type="date" name="appointment_date" required>

            <label for="appointment_time">Select Appointment Time:</label>
            <input type="time" name="appointment_time" required>

            <button type="submit">Book Appointment</button>
        </form>

        {% if message %}
            <p>{{ message }}</p>
        {% endif %}
    </div>
</body>
</html>
