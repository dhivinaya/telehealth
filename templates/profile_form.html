<!-- templates/profile_form.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile</title>
</head>
<body>
    <h1>Update Your Profile</h1>
    <form action="/update_profile" method="POST" enctype="multipart/form-data">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" value="{{ username }}" required><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" value="{{ age }}" required><br>

        <label for="gender">Gender:</label>
        <select id="gender" name="gender">
            <option value="Male" {% if gender == "Male" %}selected{% endif %}>Male</option>
            <option value="Female" {% if gender == "Female" %}selected{% endif %}>Female</option>
            <option value="Other" {% if gender == "Other" %}selected{% endif %}>Other</option>
        </select><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ email }}" required><br>

        <label for="address">Address:</label>
        <input type="text" id="address" name="address" value="{{ address }}" required><br>

        <label for="phone">Phone:</label>
        <input type="text" id="phone" name="phone" value="{{ phone }}" required><br>

        <label for="photo">Profile Photo:</label>
        <input type="file" id="photo" name="photo"><br>

        <input type="submit" value="Update Profile">
    </form>
</body>
</html>
